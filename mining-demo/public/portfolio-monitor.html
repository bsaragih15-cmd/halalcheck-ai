<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio Control Tower</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --bg:#06140f; --bg2:#091b15; --panel:rgba(255,255,255,.025); --panel2:rgba(255,255,255,.04);
 --border:rgba(120,170,155,.16); --border2:rgba(120,170,155,.28);
 --tx:#eafff8; --mut:#9fc4ba; --faint:#5e7a72;
 --teal:#2fe0c0; --green:#37d39a; --amber:#f5b94a; --red:#ff5d5d;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:radial-gradient(120% 120% at 50% -10%,#0c2320 0%,var(--bg) 55%,#040d0a 100%);color:var(--tx);
 font-family:Inter,system-ui,Arial,sans-serif;overflow:hidden}
.mono{font-family:'IBM Plex Mono',ui-monospace,monospace}
#app{height:100vh;display:flex;flex-direction:column;padding:20px 26px 18px}
/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:11px;font-size:16px;font-weight:700;letter-spacing:.01em}
.brand .dot{width:16px;height:16px;border-radius:5px;background:var(--teal);box-shadow:0 0 16px var(--teal)}
.brand .sub{color:var(--mut);font-weight:500}
.illus{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.16em;color:var(--faint);border:1px solid var(--border);padding:3px 7px;border-radius:5px;text-transform:uppercase}
.toptabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:9px;padding:4px}
.tt{font-family:inherit;font-size:13px;font-weight:600;color:var(--mut);background:transparent;border:0;padding:7px 16px;border-radius:6px;cursor:pointer}
.tt.active{background:var(--teal);color:#05201b}
.asof{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--faint);letter-spacing:.08em}
/* subtabs */
.subtabs{display:flex;gap:8px;margin-top:16px}
.stab{font-family:inherit;font-size:13.5px;font-weight:600;color:var(--mut);background:var(--panel);border:1px solid var(--border);padding:9px 18px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px}
.stab .n{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint)}
.stab.active{color:var(--tx);border-color:var(--border2);background:var(--panel2);box-shadow:inset 0 0 0 1px rgba(47,224,192,.2)}
.stab.active .n{color:var(--teal)}
/* group KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
.kpi .lab{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-family:'IBM Plex Mono',monospace}
.kpi .val{font-size:25px;font-weight:700;margin-top:7px;letter-spacing:-.01em}
.kpi .val small{font-size:13px;font-weight:600;color:var(--mut)}
.kpi .sub{font-size:12px;margin-top:5px;font-weight:600}
/* main */
main{flex:1;margin-top:16px;overflow:hidden}
.tab{height:100%}
.tab.hidden{display:none}
.secthead{display:flex;align-items:baseline;gap:10px;margin-bottom:13px}
.secthead .num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--teal)}
.secthead h2{font-size:16px;font-weight:700}
.secthead .hint{font-size:11px;color:var(--faint);letter-spacing:.02em}
.legend{margin-left:auto;display:flex;gap:14px;font-size:11px;color:var(--mut);align-items:center}
.legend i{display:inline-flex;align-items:center;gap:5px}
.chip{width:9px;height:9px;border-radius:50%}
/* subsidiary cards */
.subgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.scard{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:15px 15px 13px;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
.scard .edge{position:absolute;left:0;top:0;bottom:0;width:3px}
.scard .r1{display:flex;align-items:center;justify-content:space-between}
.scard .nm{font-size:15px;font-weight:700}
.scard .sec{font-size:10px;color:var(--faint);font-family:'IBM Plex Mono',monospace;letter-spacing:.04em;margin-top:2px}
.pill{font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;padding:4px 8px;border-radius:6px;letter-spacing:.04em;white-space:nowrap}
.pill.green{color:#062;background:rgba(55,211,154,.16);border:1px solid rgba(55,211,154,.4)}
.pill.amber{color:#3a2600;background:rgba(245,185,74,.16);border:1px solid rgba(245,185,74,.45)}
.pill.red{color:#3a0000;background:rgba(255,93,93,.16);border:1px solid rgba(255,93,93,.45)}
.txt-green{color:var(--green)} .txt-amber{color:var(--amber)} .txt-red{color:var(--red)}
.bgGreen{background:var(--green)} .bgAmber{background:var(--amber)} .bgRed{background:var(--red)}
.scard .eb{font-size:22px;font-weight:700;font-family:'IBM Plex Mono',monospace;letter-spacing:-.01em}
.scard .vsb{font-size:12px;font-weight:600;margin-top:2px}
.vbar{height:7px;border-radius:4px;background:rgba(255,255,255,.07);position:relative;margin-top:3px}
.vbar .fill{position:absolute;top:0;bottom:0;left:0;border-radius:4px}
.vbar .tick{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--mut);opacity:.6}
.scard .r2{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin-top:2px}
.spark{width:100%;height:34px;display:block}
/* table (transformation / capex) */
.tbl{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl .hd,.tbl .rw{display:grid;align-items:center;gap:14px;padding:13px 18px}
.tbl .hd{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-family:'IBM Plex Mono',monospace;border-bottom:1px solid var(--border)}
.tbl .rw{border-bottom:1px solid rgba(120,170,155,.08)}
.tbl .rw:last-child{border-bottom:0}
.tbl .rw:hover{background:rgba(255,255,255,.02)}
.trans .hd,.trans .rw{grid-template-columns:2.4fr 1fr 1.5fr 1.3fr 2fr}
.capex .hd,.capex .rw{grid-template-columns:2.2fr 1fr 1.1fr 2fr 1.1fr 1fr}
.iname{font-weight:700;font-size:14.5px}
.imeta{font-size:11px;color:var(--faint);margin-top:2px}
.prog{height:7px;border-radius:4px;background:rgba(255,255,255,.07);position:relative;margin-top:6px}
.prog .pf{position:absolute;left:0;top:0;bottom:0;border-radius:4px}
.num{font-family:'IBM Plex Mono',monospace}
.big{font-size:15px;font-weight:600}
.foot{font-size:10.5px;color:var(--faint);margin-top:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.03em}
.glyph{font-weight:700;margin-right:3px}
</style></head>
<body><div id="app">
 <div class="topbar">
   <div class="brand"><span class="dot"></span>Portfolio Control Tower <span class="illus">Illustrative</span></div>
   <div class="toptabs"><button class="tt active">Monitor</button><button class="tt" id="goStress">Stress Test</button></div>
   <div class="asof" id="asof">AS OF 30 JUN 2026 · MTD</div>
 </div>
 <div class="subtabs" id="subtabs">
   <button class="stab active" data-tab="sub"><span class="n">01</span> Subsidiary performance</button>
   <button class="stab" data-tab="trans"><span class="n">02</span> Transformation</button>
   <button class="stab" data-tab="capex"><span class="n">03</span> Capex projects</button>
 </div>
 <div class="kpis" id="kpis"></div>
 <main>
   <div class="tab" id="tab-sub"></div>
   <div class="tab hidden" id="tab-trans"></div>
   <div class="tab hidden" id="tab-capex"></div>
 </main>
</div>
<script>
const fmtG={green:{cls:'green',tx:'txt-green',bg:'bgGreen',gly:'✓',word:'ON TRACK'},
 amber:{cls:'amber',tx:'txt-amber',bg:'bgAmber',gly:'!',word:'WATCH'},
 red:{cls:'red',tx:'txt-red',bg:'bgRed',gly:'▲',word:'OFF TRACK'}};
// deterministic sparkline
function spark(seed,trend){let s=seed;const r=()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};
 const n=12,pts=[];let v=50;for(let i=0;i<n;i++){v+=(r()-0.5)*16+trend;v=Math.max(8,Math.min(92,v));pts.push(v);}
 const w=170,h=34,mx=Math.max(...pts),mn=Math.min(...pts);
 const xy=pts.map((p,i)=>[(i/(n-1))*w,h-2-((p-mn)/(mx-mn||1))*(h-6)]);
 const d=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
 const col=trend>0.5?'var(--green)':trend<-0.5?'var(--red)':'var(--amber)';
 return `<svg class="spark" viewBox="0 0 ${w} ${h}"><path d="${d}" fill="none" stroke="${col}" stroke-width="1.6" opacity=".9"/><circle cx="${xy[n-1][0].toFixed(1)}" cy="${xy[n-1][1].toFixed(1)}" r="2.4" fill="${col}"/></svg>`;}

const SUBS=[
 {nm:'Subsidiary 1',sec:'Coal',eb:142,vsb:-11,ytd:-8,rev:1.1,st:'red',sd:31},
 {nm:'Subsidiary 2',sec:'Nickel · Gold',eb:168,vsb:+2,ytd:+1,rev:0.9,st:'green',sd:7},
 {nm:'Subsidiary 3',sec:'Aluminium',eb:121,vsb:-4,ytd:-3,rev:0.8,st:'amber',sd:11},
 {nm:'Subsidiary 4',sec:'Tin',eb:38,vsb:-24,ytd:-19,rev:0.4,st:'red',sd:5},
 {nm:'Subsidiary 5',sec:'Copper · Gold · JV',eb:273,vsb:+5,ytd:+4,rev:1.6,st:'green',sd:23},
];
const INIT=[
 {nm:'Smelter ramp-up & downstreaming',own:'Operations',st:'green',pct:72,imp:180,risk:'Power supply continuity at Line 2',ms:'Line 2 commissioning · Q3'},
 {nm:'Group procurement synergy',own:'Procurement',st:'amber',pct:48,imp:95,risk:'Subsidiary adoption of category waves',ms:'Category waves 3–4 sign-off'},
 {nm:'Working-capital release',own:'Finance',st:'green',pct:64,imp:120,risk:'Offtake payment-term renegotiation',ms:'Payables standardization rollout'},
 {nm:'Coal cost-out program',own:'Subsidiary 1',st:'red',pct:35,imp:60,risk:'Stripping ratio above plan',ms:'Fleet productivity reset'},
 {nm:'Portfolio decarbonization',own:'Strategy',st:'amber',pct:22,imp:45,risk:'Capex approval for renewables PPAs',ms:'2 PPA signings'},
];
const CAPEX=[
 {nm:'Copper smelter — phase II',sub:'Subsidiary 5',bud:3.0,spent:2.6,pct:88,varc:+4,st:'amber'},
 {nm:'Smelter expansion P-III',sub:'Subsidiary 3',bud:1.8,spent:0.9,pct:50,varc:0,st:'green'},
 {nm:'Nickel HPAL complex',sub:'Subsidiary 2',bud:2.4,spent:1.1,pct:46,varc:+6,st:'amber'},
 {nm:'Coal-to-DME & rail',sub:'Subsidiary 1',bud:1.6,spent:0.4,pct:24,varc:-1,st:'green'},
 {nm:'Ausmelt furnace upgrade',sub:'Subsidiary 4',bud:0.3,spent:0.2,pct:70,varc:+9,st:'red'},
];
const sgn=v=>(v>0?'+':'')+v;
const cnt=arr=>({green:arr.filter(x=>x.st==='green').length,amber:arr.filter(x=>x.st==='amber').length,red:arr.filter(x=>x.st==='red').length});

function kpis(tab){
 const sc=cnt(SUBS), ic=cnt(INIT), cc=cnt(CAPEX);
 const ebG=SUBS.reduce((a,b)=>a+b.eb,0);
 const cards=[
  {lab:'Group EBITDA · MTD',val:`USD ${ebG} <small>M</small>`,sub:`<span class="txt-amber">▼ −6% vs budget</span>`},
  {lab:'Subsidiaries on track',val:`${sc.green} <small>/ ${SUBS.length}</small>`,sub:`<span class="txt-green">${sc.green} on</span> · <span class="txt-amber">${sc.amber} watch</span> · <span class="txt-red">${sc.red} off</span>`},
  {lab:'Capex · YTD of program',val:`USD 4.2 <small>/ 18.0 B</small>`,sub:`<span class="txt-amber">▲ +3% vs plan</span> · ${cc.red+cc.amber} of ${CAPEX.length} watch/over`},
  {lab:'Transformation value',val:`USD 310 <small>/ 540 M</small>`,sub:`<span class="txt-green">${ic.green} on</span> · <span class="txt-amber">${ic.amber} watch</span> · <span class="txt-red">${ic.red} behind</span>`},
 ];
 document.getElementById('kpis').innerHTML=cards.map(c=>`<div class="kpi"><div class="lab">${c.lab}</div><div class="val">${c.val}</div><div class="sub">${c.sub}</div></div>`).join('');
}
function legend(){return `<div class="legend">
 <i><span class="chip bgGreen"></span>✓ On track</i><i><span class="chip bgAmber"></span>! Watch</i><i><span class="chip bgRed"></span>▲ Off track / over</i></div>`;}

function renderSub(){
 const cards=SUBS.map(s=>{const g=fmtG[s.st];const vcol=s.vsb>=2?'txt-green':s.vsb<=-5?'txt-red':'txt-amber';
  const fillw=Math.min(100,60+s.vsb*2);
  return `<div class="scard"><div class="edge ${g.bg}"></div>
   <div class="r1"><div><div class="nm">${s.nm}</div><div class="sec">${s.sec}</div></div><span class="pill ${g.cls}"><span class="glyph">${g.gly}</span>${g.word}</span></div>
   <div><div class="eb">USD ${s.eb}M</div><div class="vsb ${vcol}">${s.vsb>=0?'▲':'▼'} ${sgn(s.vsb)}% vs budget</div></div>
   <div class="vbar"><div class="fill ${g.bg}" style="width:${fillw}%;opacity:.85"></div><div class="tick" style="left:60%"></div></div>
   <div class="r2"><span>YTD <b class="${s.ytd>=0?'txt-green':s.ytd<=-5?'txt-red':'txt-amber'}">${sgn(s.ytd)}%</b> vs budget</span><span>Rev USD ${s.rev}B</span></div>
   ${spark(s.sd,s.vsb/3)}</div>`;}).join('');
 document.getElementById('tab-sub').innerHTML=
  `<div class="secthead"><span class="num">01</span><h2>Subsidiary performance vs budget — monthly health check</h2><span class="hint">EBITDA, financial level · vs budget anchor</span>${legend()}</div>
   <div class="subgrid">${cards}</div>
   <div class="foot">MTD EBITDA against board-approved budget · roll-up from subsidiary management reporting · illustrative figures</div>`;
}
function renderTrans(){
 const rows=INIT.map((it,i)=>{const g=fmtG[it.st];return `<div class="rw">
   <div><div class="iname">${it.nm}</div><div class="imeta">Owner · ${it.own}</div><div class="prog"><div class="pf ${g.bg}" style="width:${it.pct}%"></div></div></div>
   <div><span class="pill ${g.cls}"><span class="glyph">${g.gly}</span>${g.word}</span></div>
   <div class="num big">${it.pct}% <span style="color:var(--faint);font-size:11px">complete</span></div>
   <div class="num big txt-green">+USD ${it.imp}M</div>
   <div><div style="font-size:12px;color:var(--mut)">⚠ ${it.risk}</div><div class="imeta">Next: ${it.ms}</div></div>
 </div>`;}).join('');
 document.getElementById('tab-trans').innerHTML=
  `<div class="secthead"><span class="num">02</span><h2>Transformation initiatives — status & value</h2><span class="hint">Top initiatives (RGP) · driven by Group transformation</span>${legend()}</div>
   <div class="tbl trans"><div class="hd"><div>Initiative</div><div>Status</div><div>Progress</div><div>Target impact</div><div>Key risk · next milestone</div></div>${rows}</div>
   <div class="foot">Value realized USD 310M of USD 540M target · ${cnt(INIT).green} on track · ${cnt(INIT).amber} watch · ${cnt(INIT).red} behind · illustrative</div>`;
}
function renderCapex(){
 const rows=CAPEX.map(c=>{const g=fmtG[c.st];const sp=Math.round(c.spent/c.bud*100);
  return `<div class="rw">
   <div><div class="iname">${c.nm}</div><div class="imeta">${c.sub}</div></div>
   <div class="num big">USD ${c.bud.toFixed(1)}B</div>
   <div class="num big">USD ${c.spent.toFixed(1)}B</div>
   <div><div class="prog"><div class="pf ${g.bg}" style="width:${sp}%"></div></div><div class="imeta">${c.pct}% complete · ${sp}% of budget spent</div></div>
   <div class="num big ${c.varc>0?'txt-red':'txt-green'}">${c.varc>0?'▲ ':''}${sgn(c.varc)}%</div>
   <div><span class="pill ${g.cls}"><span class="glyph">${g.gly}</span>${g.word}</span></div>
 </div>`;}).join('');
 document.getElementById('tab-capex').innerHTML=
  `<div class="secthead"><span class="num">03</span><h2>Capex projects — cost & schedule health</h2><span class="hint">Top projects vs approved cost · holding-level program</span>${legend()}</div>
   <div class="tbl capex"><div class="hd"><div>Project</div><div>Budget</div><div>Spent</div><div>Progress vs spend</div><div>Cost var</div><div>Status</div></div>${rows}</div>
   <div class="foot">USD 18.0B program · USD 4.2B deployed YTD · ${cnt(CAPEX).green} on budget · ${cnt(CAPEX).amber} watch · ${cnt(CAPEX).red} over · illustrative</div>`;
}
renderSub();renderTrans();renderCapex();kpis('sub');
document.querySelectorAll('.stab').forEach(b=>b.onclick=()=>{
 document.querySelectorAll('.stab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
 const t=b.dataset.tab;['sub','trans','capex'].forEach(k=>document.getElementById('tab-'+k).classList.toggle('hidden',k!==t));
});
document.getElementById('goStress').onclick=()=>{location.href='ceo-cockpit.html';};
</script></body></html>
