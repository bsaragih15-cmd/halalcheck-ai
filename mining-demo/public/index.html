<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OreSight AI — Operations Intelligence for Indonesian Mining</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,2 95,27 95,73 50,98 5,73 5,27' fill='%2315803d'/><text x='50' y='64' font-size='38' font-family='monospace' font-weight='800' text-anchor='middle' fill='%23ffffff'>OS</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="landing">

  <main class="hero-matrix" id="matrix">
    <div class="hm-inner">
      <span class="section-tag">Select example use-cases · click any cell to launch</span>
      <div class="matrix-wrap">
        <div class="matrix-flex">
          <div class="matrix-axis">Decision&nbsp;horizon</div>
          <div class="matrix" id="matrixGrid"></div>
        </div>
      </div>
      <div class="matrix-legend" id="matrixLegend"></div>
    </div>
  </main>

  <script type="module">
    import { renderNav } from '/js/shared.js';
    import { renderMatrix, renderLegend } from '/js/matrix.js';
    renderNav('matrix');
    renderMatrix(document.getElementById('matrixGrid'));
    renderLegend(document.getElementById('matrixLegend'));
  </script>
  <script src="/js/tour.js"></script>
  <script>
    OreTour.init({ label: 'Guided tour', steps: [
      { sel: '.section-tag', title: 'The OreSight value chain', text: 'Every AI use-case across the mining operation, on one grid. Pick any cell to open a live module.' },
      { sel: '.chevron', title: 'Columns = value-chain stages', text: 'Left to right: exploration → drill &amp; blast → load &amp; haul → processing → hauling → port → shipping → marketing.' },
      { sel: '.matrix-axis', title: 'Rows = decision horizon', text: 'Top to bottom: from real-time (0h control tower) down to life-of-mine (+10y) planning.' },
      { sel: '.matrix-cell.live', title: 'Live demos', text: 'Green ▶ LIVE DEMO cells are fully interactive — click one (Hauling, Blast, Blending, Shipping…) to open the module. Each has its own guided tour inside.' },
      { sel: '#matrixLegend', title: 'Legend', text: 'Shows each cell’s primary value driver (throughput, cost, margin, NPV) and whether it’s a live demo or in development.' },
    ]});
  </script>
</body>
</html>
