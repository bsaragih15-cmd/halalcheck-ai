<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OreSight AI — IROC Integrated Operations Centre</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,2 95,27 95,73 50,98 5,73 5,27' fill='%2315803d'/><text x='50' y='64' font-size='38' font-family='monospace' font-weight='800' text-anchor='middle' fill='%23ffffff'>OS</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;}
    body{font-family:'Barlow Semi Condensed',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
    .mono{font-family:'IBM Plex Mono',monospace;}
    button{cursor:pointer;font-family:inherit;} input{font-family:inherit;}
    #irocRoot{
      --bg:#eef1f5;--panel:#fff;--elevated:#fff;--inset:#f3f5f8;--track:#e7ebf0;--border:#dde3ea;--line:#e7ebf0;
      --text:#1f2937;--muted:#647082;--faint:#8a95a3;--accent:#0d9488;--accent-soft:rgba(13,148,136,.12);
      --green:#059669;--amber:#d97706;--red:#dc2626;--blue:#2563eb;--gray:#94a3b8;--ret:#0891b2;
      --needle:#334155;--truck-stroke:rgba(15,23,42,.45);--shadow:0 1px 3px rgba(16,24,40,.07),0 1px 2px rgba(16,24,40,.04);
      --map-bg:#e7ebf0;--map-grid:#dfe3e9;--bench-line:#c8bda6;--bench1:#e7e1d5;--bench2:#ded6c6;--bench3:#d4cab4;--bench4:#cabda4;
      --road:#b7bec8;--road-flow:#88929d;--dest:#e9e3d6;--dest-stroke:#bcae96;--dest-roof:#c9b48f;--pit-label:#9aa0a8;--shovel-fill:#cfe9e0;
      height:100vh;overflow:hidden;background:var(--bg);color:var(--text);display:flex;flex-direction:column;padding:14px 16px 12px;gap:12px;
    }
    #irocRoot[data-variant="blueprint"]{--bg:#eef2f8;--panel:#fff;--elevated:#fff;--inset:#eef3fb;--track:#e2eaf5;--border:#d3deee;--line:#e2eaf5;--text:#14233b;--muted:#566884;--faint:#8493ab;--accent:#2563eb;--accent-soft:rgba(37,99,235,.10);--green:#0f8a5f;--amber:#c2740a;--red:#d23b3b;--blue:#2563eb;--gray:#93a2bb;--ret:#0e7490;--needle:#243b5e;--truck-stroke:rgba(20,35,59,.45);--shadow:0 1px 3px rgba(20,40,80,.10),0 1px 2px rgba(20,40,80,.05);--map-bg:#e4ebf6;--map-grid:#dbe4f1;--bench-line:#aabbd6;--bench1:#dbe4f1;--bench2:#d0dbec;--bench3:#c5d2e6;--bench4:#b9c9df;--road:#aebfd6;--road-flow:#6f86b3;--dest:#d9e2f1;--dest-stroke:#a4b6d4;--dest-roof:#b9c9e3;--pit-label:#7e8fb0;--shovel-fill:#d4e2f5;}
    #irocRoot[data-variant="warm"]{--bg:#f4efe7;--panel:#fffdf9;--elevated:#fffdf9;--inset:#f6f1e8;--track:#ece3d4;--border:#e6ddcd;--line:#efe8da;--text:#2a2722;--muted:#756c5d;--faint:#998f7d;--accent:#c2620f;--accent-soft:rgba(194,98,15,.12);--green:#047857;--amber:#b45309;--red:#b91c1c;--blue:#1d4ed8;--gray:#a89a85;--ret:#0f766e;--needle:#4a4334;--truck-stroke:rgba(42,39,34,.42);--shadow:0 1px 3px rgba(80,60,30,.10),0 1px 2px rgba(80,60,30,.05);--map-bg:#efe7da;--map-grid:#e7dcc9;--bench-line:#c9b89c;--bench1:#e8dcc6;--bench2:#e0d2b8;--bench3:#d6c6a6;--bench4:#ccb993;--road:#c3b59c;--road-flow:#9c8a6f;--dest:#e4d6bd;--dest-stroke:#bca888;--dest-roof:#cdbb98;--pit-label:#998c76;--shovel-fill:#d8ead6;}
    @keyframes ctBlink{0%,100%{opacity:1;}50%{opacity:.25;}}
    @keyframes pulsering{0%{r:14;opacity:.9;}100%{r:46;opacity:0;}}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);}
    .lbl{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
    .faint{color:var(--faint);}
    /* header */
    .ct-hdr{display:flex;align-items:center;gap:16px;flex-shrink:0;}
    .ct-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
    .ct-logo{width:34px;height:34px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;}
    .ct-bt1{font-size:18px;font-weight:700;letter-spacing:-.01em;color:var(--text);line-height:1.05;}
    .ct-bt2{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--faint);}
    .ct-spacer{flex:1;}
    .ct-seg{display:flex;background:var(--inset);border:1px solid var(--border);border-radius:9px;padding:3px;}
    .ct-seg button{border:none;background:transparent;font-size:11px;font-weight:600;color:var(--muted);padding:5px 11px;border-radius:6px;text-transform:capitalize;}
    .ct-seg button.active{background:var(--elevated);color:var(--accent);box-shadow:var(--shadow);}
    .ct-clock{font-size:22px;font-weight:600;color:var(--text);line-height:1;}
    .ct-shift{font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--faint);margin-top:3px;}
    .ct-ico{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;position:relative;box-shadow:var(--shadow);}
    .ct-badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:600;border-radius:8px;padding:0 4px;min-width:16px;text-align:center;font-family:'IBM Plex Mono',monospace;}
    .ct-live{display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:999px;background:var(--accent-soft);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);}
    .ct-live .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:ctBlink 1.7s infinite;}
    .ct-live span{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);font-weight:600;}
    /* body */
    .ct-body{flex:1;min-height:0;display:grid;grid-template-columns:1.4fr 1fr;gap:14px;}
    .ct-left{display:flex;flex-direction:column;gap:13px;min-height:0;min-width:0;}
    .ct-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;flex-shrink:0;}
    .ct-kpi{padding:13px 15px;}
    .ct-kpi-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
    .ct-kpi-d{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;}
    .ct-kpi-v{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--text);margin-top:11px;}
    .ct-kpi-v span{font-size:13px;font-weight:600;color:var(--muted);margin-left:3px;}
    .ct-kpi-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--faint);margin-top:8px;}
    /* map */
    .ct-map{flex:1;min-height:170px;position:relative;overflow:hidden;}
    .ct-map svg.scene{position:absolute;inset:0;width:100%;height:100%;}
    .ct-ovl{position:absolute;z-index:8;}
    .ct-ovl.tl{top:12px;left:14px;} .ct-ovl.tr{top:12px;right:14px;} .ct-ovl.bl{bottom:12px;left:14px;}
    .ct-livetag{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text);background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:5px 9px;box-shadow:var(--shadow);}
    .ct-livedot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:ctBlink 1.6s infinite;}
    .ct-leg{display:flex;gap:9px;margin-top:6px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--border);border-radius:7px;padding:5px 9px;box-shadow:var(--shadow);}
    .ct-leg span{display:flex;align-items:center;gap:5px;font-size:9.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
    .ct-leg i{width:9px;height:9px;border-radius:2px;}
    .ct-predwrap{margin-top:6px;max-width:240px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:7px 9px;box-shadow:var(--shadow);}
    .ct-pred-cap{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:5px;}
    .ct-pred-row{display:flex;align-items:center;gap:8px;font-size:10.5px;color:var(--text);padding:2px 0;}
    .ct-pred-p{font-family:'IBM Plex Mono',monospace;font-weight:600;min-width:32px;}
    .ct-pred-p.hi{color:var(--red);}.ct-pred-p.med{color:var(--amber);}.ct-pred-p.lo{color:var(--green);}
    .ct-alpill{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--red);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;color:var(--red);box-shadow:var(--shadow);}
    .ct-alpill .d{width:7px;height:7px;border-radius:50%;background:var(--red);animation:ctBlink 1.2s infinite;}
    .ct-tele{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:8px 11px;box-shadow:var(--shadow);}
    .ct-tele .big{font-size:21px;font-weight:600;color:var(--text);font-family:'IBM Plex Mono',monospace;}
    .ct-pop{position:absolute;z-index:9;background:var(--elevated);border:1px solid var(--border);border-radius:9px;box-shadow:0 10px 30px rgba(16,24,40,.2);padding:10px;}
    .ct-triage{font-size:11px;color:var(--accent);background:var(--accent-soft);border:1px solid var(--border);border-radius:6px;padding:6px 8px;margin-bottom:8px;font-weight:600;}
    .ct-alrow{display:flex;gap:8px;align-items:flex-start;padding:7px 6px;border-radius:6px;cursor:pointer;}
    .ct-alrow:hover{background:var(--inset);} .ct-alrow .d{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
    .ct-alrow .tx{font-size:12px;color:var(--text);line-height:1.3;} .ct-alrow .mt{font-size:10px;color:var(--faint);font-family:'IBM Plex Mono',monospace;}
    /* dock */
    .ct-dock{flex-shrink:0;display:grid;grid-template-columns:1.1fr 0.95fr 1.2fr;gap:13px;height:150px;}
    .ct-dpanel{padding:11px 13px;display:flex;flex-direction:column;min-width:0;}
    .ct-dcap2{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);}
    .ct-dcap2-row{display:flex;align-items:center;justify-content:space-between;}
    .ct-bind{font-size:19px;font-weight:800;letter-spacing:-.01em;margin:7px 0 9px;text-transform:capitalize;}
    .ct-dbars{display:flex;flex-direction:column;gap:6px;}
    .ct-dbar-top{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10px;}
    .ct-dbar{height:6px;border-radius:4px;background:var(--track);overflow:hidden;margin-top:3px;}
    .ct-dbar>div{height:100%;border-radius:4px;transition:width .5s;}
    .ct-dgauges{flex-direction:row;gap:6px;}
    .ct-dg{flex:1;text-align:center;display:flex;flex-direction:column;min-width:0;}
    .ct-dg svg{flex:1;min-height:0;}
    .ct-dgv{font-size:20px;font-weight:800;line-height:1;margin-top:-6px;}
    .ct-dgv span{font-size:11px;color:var(--muted);font-weight:600;}
    .ct-dtoggles{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0;flex:1;align-content:flex-start;}
    .ct-dtoggle{display:inline-flex;align-items:center;gap:5px;background:var(--inset);border:1px solid var(--border);color:var(--text);font-size:10.5px;font-weight:600;padding:4px 8px;border-radius:999px;white-space:nowrap;}
    .ct-dtoggle .dot{width:6px;height:6px;border-radius:50%;}
    .ct-dtoggle:hover{border-color:var(--accent);} .ct-dtoggle.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
    .ct-dfree{display:flex;gap:6px;}
    .ct-dfree input{flex:1;min-width:0;background:var(--inset);border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-size:11.5px;color:var(--text);outline:none;}
    .ct-dfree input:focus{border-color:var(--accent);}
    .ct-dfree button{border:none;background:var(--accent);color:#fff;border-radius:7px;padding:5px 11px;font-weight:700;font-size:13px;}
    .ct-dreset{border:1px solid var(--border);background:var(--inset);color:var(--muted);border-radius:6px;padding:2px 7px;font-size:12px;}
    /* rail */
    .ct-rail{display:flex;flex-direction:column;gap:12px;min-height:0;min-width:0;}
    .ct-rail-top{flex:1;min-height:0;overflow-y:auto;}
    .ct-rt-card{padding:18px 19px;height:100%;}
    .ct-rt-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
    .ct-rt-badge{width:24px;height:24px;border-radius:7px;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
    .ct-rt-cap{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;}
    .ct-rt-flash{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);opacity:0;transition:opacity .3s;}
    .ct-rt-x{margin-left:auto;cursor:pointer;color:var(--muted);}
    .ct-rt-hl{font-size:19px;font-weight:700;line-height:1.4;letter-spacing:-.01em;color:var(--text);margin-bottom:16px;}
    .ct-impact{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
    .ct-impact>div{background:var(--inset);border:1px solid var(--border);border-radius:10px;padding:10px 11px;}
    .ct-impact .l{font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);}
    .ct-impact .v{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:var(--text);margin-top:3px;text-transform:capitalize;}
    .ct-rt-sec{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:14px 0 8px;}
    .ct-act{background:var(--inset);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:8px 11px;margin-bottom:7px;}
    .ct-act-a{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;}
    .ct-act-m{font-size:11px;color:var(--muted);margin-top:2px;}
    .ct-rt-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
    .ct-rt-rc{font-size:12.5px;line-height:1.5;color:var(--text);}
    .ct-rec{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px;}
    .ct-rec .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0;}
    .ct-rec .a{font-size:12.5px;color:var(--text);font-weight:600;} .ct-rec .i{font-size:11.5px;color:var(--muted);}
    .ct-comms-draft{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);background:var(--accent-soft);border:1px solid var(--border);border-radius:8px;padding:9px 11px;line-height:1.4;}
    .ct-risk{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px;}
    .ct-risk .p{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;min-width:36px;}
    .ct-risk .t{font-size:13px;color:var(--text);font-weight:600;} .ct-risk .s{font-size:11.5px;color:var(--muted);}
    .ct-copilot{flex-shrink:0;padding:14px 16px;}
    .ct-cp-qs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0;}
    .ct-cp-q{border:1px solid var(--border);background:var(--inset);border-radius:8px;padding:6px 10px;font-size:11.5px;color:var(--text);}
    .ct-cp-q:hover{border-color:var(--accent);}
    .ct-cp-row{display:flex;gap:7px;}
    .ct-cp-row input{flex:1;min-width:0;background:var(--inset);border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:12.5px;color:var(--text);outline:none;}
    .ct-cp-row input:focus{border-color:var(--accent);}
    .ct-cp-row button{border:none;background:var(--accent);color:#fff;border-radius:8px;padding:8px 15px;font-weight:700;font-size:12px;}
    .ct-cp-ans{font-size:12.5px;line-height:1.5;color:var(--text);margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
  </style>
</head>
<body>
  <div id="irocRoot" data-variant="console"></div>
  <script type="module" src="/js/control-tower.js"></script>
<script src="/js/tour.js"></script>
<script>OreTour.init({"label":"Guided tour","steps":[{"sel":".card.ct-kpi","title":"KPIs","text":"Live production status across the pit-to-plant chain."},{"sel":".card.ct-map","title":"Live map","text":"Fleet, shovels and the haul network in real time."},{"sel":".ct-bind","title":"Binding constraint","text":"What’s limiting the chain right now — loader, crusher, mill, geotech or weather."},{"sel":".card.ct-dpanel","title":"Disruption re-dispatch","text":"Inject an exception and get a ranked, owned mitigation plan with a drafted broadcast."},{"sel":".card.ct-copilot","title":"Copilot","text":"Ask the duty-controller copilot about risk to the plan and where to deploy the fleet."}]});</script>
</body>
</html>
