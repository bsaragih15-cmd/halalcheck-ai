document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ono',monospace; font-size:9px; color:#5f6b7a;\">\n              <span style=\"position:absolute; left:0%; transform:translateX(-50%);\">15<\u002Fspan>\n              <span style=\"position:absolute; left:14.29%; transform:translateX(-50%);\">17<\u002Fspan>\n              <span style=\"position:absolute; left:28.57%; transform:translateX(-50%);\">19<\u002Fspan>\n              <span style=\"position:absolute; left:42.86%; transform:translateX(-50%);\">21<\u002Fspan>\n              <span style=\"position:absolute; left:57.14%; transform:translateX(-50%);\">23<\u002Fspan>\n              <span style=\"position:absolute; left:71.43%; transform:translateX(-50%);\">25<\u002Fspan>\n              <span style=\"position:absolute; left:85.71%; transform:translateX(-50%);\">27<\u002Fspan>\n              <span style=\"position:absolute; left:100%; transform:translateX(-50%);\">29 Jun<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasSelection }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; top:10px; right:10px; z-index:6; width:288px; background:rgba(10,15,23,.96); border:1px solid rgba(53,224,212,.35); border-radius:8px; padding:14px 16px; box-shadow:0 14px 34px rgba(0,0,0,.55);\">\n            <div style=\"display:flex; align-items:flex-start; justify-content:space-between;\">\n              <div>\n                <div style=\"font-size:15px; font-weight:600; color:#eef3f8;\">{{ sel.name }}<\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#7d8a99; margin-top:2px;\">{{ sel.type }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ closeSel }}\" style=\"border:none; background:rgba(255,255,255,.08); color:#9aa6b4; width:22px; height:22px; border-radius:5px; cursor:pointer; font-size:11px;\">✕<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"margin-top:12px; display:grid; grid-template-colum    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { t: 0, buffer: 3.8, cranes: 2, draft: 12.6, weather: 1, tab: 'schedule', os: true, solving: false, candParams: null, evalN: 0, selected: null, tourStep: -1 };\n\n  componentDidMount() {\n    this._t = 0;\n    this.timer = setInterval(() => { this._t += 1; this.setState({ t: this._t }); }, 80);\n    this._baseline = this.cost(0.6, 1, 12.2, 2).total;\n    this._fit = () => {\n      const st = document.getElementById('stage');\n      if (!st) return;\n      const box = st.parentElement;\n      const w = (box && box.clientWidth) || window.innerWidth || 0;\n      const h = (box && box.clientHeight) || window.innerHeight || 0;\n      if (!w || !h) { requestAnimationFrame(this._fit); return; }\n      const sc = Math.max(0.05, Math.min(w / 1920, h / 1080));\n      st.style.transform = 'scale(' + sc + ')';\n    };\n    requestAnimationFrame(this._fit);\n    setTimeout(this._fit, 120);\n    setTimeout(this._fit, 400);\n    window.addEventListener('resize', this._fit);\n    const st0 = document.getElementById('stage');\n    if (st0 && st0.parentElement && window.ResizeObserver) {\n      this._ro = new ResizeObserver(this._fit);\n      this._ro.observe(st0.parentElement);\n    }\n  }\n  componentWillUnmount() { clearInterval(this.timer); clearInterval(this._solveTimer); if (this._fit) window.removeEventListener('resize', this._fit); if (this._ro) this._ro.disconnect(); }\n\n  cost(b, c, d, w) {\n    const ceiling = 12.9;\n    let demurrage = 900000 * Math.exp(-b / 2.4) - (c - 1) * 220000 + w * 90000;\n    demurrage = Math.max(0, demurrage);\n    const bufferCarry = 92000 * b;\n    const craneCharter = 130000 + 175000 * (c - 1);\n    let tideFreight = 150000 * (13.5 - d) + 40000 * w + 80000;\n    if (d > ceiling) tideFreight += (d - ceiling) * 420000;\n    return { demurrage, bufferCarry, craneCharter, tideFreight, total: demurrage + bufferCarry + craneCharter + tideFreight };\n  }\n\n  best(w) {\n    const ceiling = 12.9;\n    let best = null;\n    for (let c = 1; c <= 3; c++) {\n      for (let b = 0.5; b <= 6.0001; b += 0.1) {\n        const r = this.cost(b, c, ceiling, w);\n        if (!best || r.total < best.total) best = { b: +b.toFixed(1), c, d: ceiling, total: r.total };\n      }\n    }\n    return best;\n  }\n\n  renderVals() {\n    const s = this.state;\n    const money = (n) => Math.round(n / 100) * 100;\n    const fmt = (n) => money(n).toLocaleString('en-US');\n\n    const CHAOS = { buffer: 0.6, cranes: 1, draft: 12.2, weather: 2 };\n    let p;\n    if (s.solving && s.candParams) p = s.candParams;\n    else if (!s.os) p = CHAOS;\n    else p = { buffer: s.buffer, cranes: s.cranes, draft: s.draft, weather: s.weather };\n\n    const c = this.cost(p.buffer, p.cranes, p.draft, p.weather);\n    const baseline = this._baseline || 1500000;\n    const rec = this.best(p.weather);\n    const recSavings = Math.max(0, baseline - rec.total);\n\n    // animated count-up: ease displayed cost components toward target\n    const tg = { dem: c.demurrage, carry: c.bufferCarry, crane: c.craneCharter, tide: c.tideFreight };\n    if (!this._disp) this._disp = Object.assign({}, tg);\n    else for (const k in tg) { const dd = tg[k] - this._disp[k]; this._disp[k] += Math.abs(dd) < 800 ? dd : dd * 0.28; }\n    const D = this._disp;\n    const dTotal = D.dem + D.carry + D.crane + D.tide;\n\n    const delta = baseline - dTotal;\n    const deltaText = delta >= 0 ? '▼ $' + fmt(delta) + ' vs without-OreSight' : '▲ $' + fmt(-delta) + ' over baseline';\n\n    let noteText = '✓ within tide ceiling 12.9 m · crane capacity ok', noteColor = '#4ade80';\n    if (p.cranes < 2) { noteText = '⚠ 1 crane — binding constraint, demurrage spikes'; noteColor = '#ef4444'; }\n    else if (p.draft > 12.9) { noteText = '⚠ draft ' + p.draft.toFixed(1) + ' m over today\\u2019s tide ceiling 12.9 m'; noteColor = '#ffb547'; }\n\n    const segBtn = 'flex:1; padding:8px 4px; border:none; border-radius:3px; font-family:\"IBM Plex Mono\",monospace; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s ease;';\n    const on = segBtn + ' background:#35e0d4; color:#06231f;';\n    const off = segBtn + ' background:rgba(255,255,255,.05); color:#8b96a5;';\n\n    const tabBtn = 'padding:7px 14px; border:none; border-radius:3px; font-family:\"IBM Plex Mono\",monospace; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s ease;';\n    const tabOn = tabBtn + ' background:#35e0d4; color:#06231f;';\n    const tabOff = tabBtn + ' background:transparent; color:#8b96a5;';\n\n    // ---- chain throughput nodes (kt/d); crane reacts to levers, min = binding ----\n    const wf2 = [1.0, 0.85, 0.6][p.weather];\n    const craneCap = Math.round(p.cranes * 19 * wf2);\n    const capDefs = [\n      { label: 'STOCKPILE', sub: 'reclaim', cap: 60, left: 212, top: 447, base: '#ff7849' },\n      { label: 'JETTY', sub: 'conveyor', cap: 52, left: 329, top: 417, base: '#ff7849' },\n      { label: 'BARGE', sub: 'shuttle', cap: 44, left: 444, top: 388, base: '#ff7849' },\n      { label: 'FLOATING CRANE', sub: p.cranes + ' units', cap: craneCap, left: 574, top: 330, base: '#35e0d4' },\n      { label: 'OGV', sub: 'hold intake', cap: 55, left: 725, top: 208, base: '#35e0d4' },\n    ];\n    const minCap = Math.min.apply(null, capDefs.map(x => x.cap));\n    const maxCap = Math.max.apply(null, capDefs.map(x => x.cap));\n    const bindingLabel = (capDefs.find(x => x.cap === minCap) || {}).label || '—';\n    const chain = capDefs.map(x => {\n      const binding = x.cap === minCap;\n      return {\n        label: x.label, sub: x.sub, cap: x.cap + ' kt/d',\n        left: x.left, top: x.top,\n        color: binding ? '#ffb547' : x.base,\n        isBinding: binding,\n        barPct: Math.round(x.cap / maxCap * 100),\n      };\n    });\n\n    // ---- gantt vessels (bars + details react to levers) ----\n    const TODAY = 18.4;\n    const rate = p.cranes * 19 * wf2;\n    const pctf = (d) => Math.max(0, Math.min(100, (d - 15) / 14 * 100));\n    const dayTxt = (d) => Math.round(d) + '';\n    const vdefs = [\n      { name: 'MV Halmahera', type: 'Capesize · 180kt', ton: 180, arr: 15.5, loadStart: 16, win: 1.5 },\n      { name: 'MV Sulawesi', type: 'Supramax · 58kt', ton: 58, arr: 17, loadStart: 17.5, win: 2.0 },\n      { name: 'MV Banda Sea', type: 'Panamax · 76kt', ton: 76, arr: 20.5, loadStart: 21, win: 2.0 },\n      { name: 'MV Flores', type: 'Handymax · 45kt', ton: 45, arr: 23.5, loadStart: 24, win: 2.0 },\n      { name: 'MV Banggai', type: 'Capesize · 165kt', ton: 165, arr: 25.5, loadStart: 26, win: 2.0 },\n    ];\n    const vessels = vdefs.map((v, i) => {\n      const dur = v.ton / rate;\n      const layEnd = v.arr + v.win + p.buffer;\n      const loadEnd = v.loadStart + dur;\n      const gStart = v.loadStart, gEnd = Math.min(TODAY, loadEnd, layEnd);\n      const hStart = Math.max(v.loadStart, TODAY), hEnd = Math.min(loadEnd, layEnd);\n      const dStart = layEnd, dEnd = loadEnd;\n      const hasGreen = gEnd > gStart + 0.05;\n      const hasHatch = hEnd > hStart + 0.05;\n      const hasDem = dEnd > dStart + 0.05;\n      const prog = Math.max(0, Math.min(100, (Math.min(TODAY, loadEnd) - v.loadStart) / dur * 100));\n      const gW = pctf(gEnd) - pctf(gStart);\n      const loading = v.loadStart < TODAY && loadEnd > TODAY;\n      const demDays = Math.max(0, loadEnd - layEnd);\n      const exposure = Math.round(demDays * 26000);\n      const status = hasDem ? { t: 'DEMURRAGE RISK', c: '#ffb547' } : (loading ? { t: 'LOADING', c: '#35e0d4' } : (loadEnd <= TODAY ? { t: 'COMPLETE', c: '#4ade80' } : { t: 'ON PLAN', c: '#4ade80' }));\n      const isSel = s.selected === i;\n      return {\n        name: v.name, type: v.type,\n        nameColor: hasDem ? '#ffb547' : '#eef3f8',\n        layLeft: pctf(v.arr).toFixed(2), layWidth: (pctf(layEnd) - pctf(v.arr)).toFixed(2),\n        hasGreen, gLeft: pctf(gStart).toFixed(2), gWidth: gW.toFixed(2), pctLabel: gW > 5 ? Math.round(prog) + '%' : '',\n        hasHatch, hLeft: pctf(hStart).toFixed(2), hWidth: (pctf(hEnd) - pctf(hStart)).toFixed(2),\n        hasDem, dLeft: pctf(dStart).toFixed(2), dWidth: (pctf(dEnd) - pctf(dStart)).toFixed(2),\n        onSelect: () => this.setState({ selected: this.state.selected === i ? null : i }),\n        accent: isSel ? '#35e0d4' : 'transparent',\n        rowBg: isSel ? 'rgba(53,224,212,.10)' : 'transparent',\n        rowOpacity: (s.selected != null && !isSel) ? '0.4' : '1',\n        laycanText: dayTxt(v.arr) + '–' + dayTxt(layEnd) + ' Jun',\n        etaText: loading ? 'loading now' : (loadEnd <= TODAY ? 'loaded' : 'ETA ' + dayTxt(v.loadStart) + ' Jun'),\n        loadPctText: Math.round(prog) + '%',\n        exposureNum: exposure,\n        exposureText: exposure > 0 ? '$' + Math.round(exposure / 1000) + 'k' : '$0',\n        exposureColor: exposure > 0 ? '#ffb547' : '#4ade80',\n        statusText: status.t, statusColor: status.c,\n        waitingOn: hasDem ? bindingLabel : 'on schedule',\n      };\n    });\n    const sel = s.selected != null ? vessels[s.selected] : null;\n\n    // ---- constraint cascade (sorted by capacity; #1 = binding, #2 = next) ----\n    const sorted = capDefs.slice().sort((a, b) => a.cap - b.cap);\n    const stack = sorted.map((x, idx) => ({\n      label: x.label, cap: x.cap + ' kt/d', rank: idx + 1,\n      color: idx === 0 ? '#ffb547' : (idx === 1 ? '#ffd9a0' : '#6b7785'),\n      isBinding: idx === 0, isNext: idx === 1,\n    }));\n\n    // ---- next-best-action alert rail ----\n    const risky = vessels.filter(v => v.exposureNum > 0).sort((a, b) => b.exposureNum - a.exposureNum);\n    const totalRisk = risky.reduce((acc, v) => acc + v.exposureNum, 0);\n    const hasAlert = risky.length > 0;\n    const fixLabel = bindingLabel === 'FLOATING CRANE' ? 'add a floating crane (FC-2)' : 'add capacity at ' + bindingLabel.toLowerCase();\n    const alertText = hasAlert ? (risky[0].name + ' · ' + risky[0].exposureText + ' demurrage risk') : 'All vessels on plan — chain in sync';\n    const alertFix = hasAlert ? ('→ ' + fixLabel) : '';\n    const alertCount = risky.length;\n    const alertRisk = '$' + Math.round(totalRisk / 1000) + 'k at risk';\n\n    const hdrBtn = 'padding:7px 13px; border:none; border-radius:3px; font-family:\"IBM Plex Mono\",monospace; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s ease;';\n    const lockStyle = (s.solving || !s.os) ? 'pointer-events:none; opacity:.45;' : '';\n\n    // ---- guided tour ----\n    const TOUR = [\n      { t: 'AI recommendation', b: 'The solver\\u2019s cheapest plan in plain words — and the dollars it saves versus running the chain by hand.', r: [24, 294, 440, 150], tip: [24, 452] },\n      { t: 'Live chain map', b: 'The whole chain on the water, Morowali to Kendari. Each stage shows its throughput; the pulsing amber node is today\\u2019s binding constraint.', r: [472, 122, 936, 640], tip: [762, 552] },\n      { t: 'Constraint stack', b: 'Every stage ranked by capacity. Relieve the #1 bottleneck and the one tagged NEXT takes over — the cascade is the story.', r: [490, 170, 198, 156], tip: [702, 176] },\n      { t: 'Scenario levers', b: 'Drag laycan buffer, floating cranes and sailing draft — weather is exogenous. The model re-optimises instantly.', r: [1418, 150, 478, 330], tip: [1094, 196] },\n      { t: 'Controllable cost', b: 'Annual cost split into demurrage, buffer carry, crane charter and tide/freight — measured against the without-OreSight baseline.', r: [1418, 494, 478, 268], tip: [1094, 520] },\n      { t: 'Berth & anchorage schedule', b: 'Laycan windows, confirmed loading, AIS-ML forecast and demurrage overrun. Click any vessel to inspect it.', r: [24, 770, 1872, 294], tip: [690, 800] },\n      { t: 'Next best action', b: 'The single highest-value move right now, ranked by demurrage at risk. One click applies the fix.', r: [24, 68, 1872, 46], tip: [40, 130] },\n    ];\n    const ti = s.tourStep;\n    const tourOn = ti >= 0 && ti < TOUR.length;\n    const ts = tourOn ? TOUR[ti] : null;\n\n    return {\n      vessels,\n      chain,\n      sel,\n      hasSelection: sel != null,\n      solving: s.solving,\n      notSolving: !s.solving,\n      chaosMode: !s.os && !s.solving,\n      evalN: s.evalN,\n      lockStyle,\n      genLabel: s.solving ? '◐ Solving…' : '✦ Generate AI Recommendation',\n      withStyle: s.os ? hdrBtn + ' background:#35e0d4; color:#06231f;' : hdrBtn + ' background:transparent; color:#8b96a5;',\n      withoutStyle: !s.os ? hdrBtn + ' background:#ef4444; color:#fff;' : hdrBtn + ' background:transparent; color:#8b96a5;',\n      water: (2.30 + 0.07 * Math.sin(s.t / 11)).toFixed(2),\n      buffer: p.buffer.toFixed(1),\n      cranes: p.cranes,\n      craneKt: p.cranes * 19,\n      draft: p.draft.toFixed(1),\n      total: fmt(dTotal),\n      deltaText, deltaColor: delta >= 0 ? '#4ade80' : '#ef4444',\n      valDem: fmt(D.dem), valCarry: fmt(D.carry), valCrane: fmt(D.crane), valTide: fmt(D.tide),\n      segDem: (D.dem / dTotal * 100).toFixed(1),\n      segCarry: (D.carry / dTotal * 100).toFixed(1),\n      segCrane: (D.crane / dTotal * 100).toFixed(1),\n      segTide: (D.tide / dTotal * 100).toFixed(1),\n      stack,\n      hasAlert, alertText, alertFix, alertCount, alertRisk,\n      alertColor: hasAlert ? '#ffb547' : '#4ade80',\n      alertTag: hasAlert ? '⚠ NEXT BEST ACTION' : '✓ STATUS',\n      alertBg: hasAlert ? 'rgba(255,181,71,.08)' : 'rgba(74,222,128,.06)',\n      alertBorder: hasAlert ? 'rgba(255,181,71,.3)' : 'rgba(74,222,128,.25)',\n      noteText, noteColor,\n      recText: 'Run ' + rec.c + ' floating cranes, hold laycan buffer at ' + rec.b.toFixed(1) + ' d, load to ' + rec.d.toFixed(1) + ' m on the spring tide.',\n      recSavings: fmt(recSavings),\n      tideOn: s.tab === 'tide',\n      schedTabStyle: s.tab === 'schedule' ? tabOn : tabOff,\n      tideTabStyle: s.tab === 'tide' ? tabOn : tabOff,\n      calmStyle: p.weather === 0 ? on : off,\n      modStyle: p.weather === 1 ? on : off,\n      roughStyle: p.weather === 2 ? on : off,\n      setBuffer: (e) => this.setState({ buffer: parseFloat(e.target.value) }),\n      setCranes: (e) => this.setState({ cranes: parseInt(e.target.value, 10) }),\n      setDraft: (e) => this.setState({ draft: parseFloat(e.target.value) }),\n      setCalm: () => this.setState({ weather: 0 }),\n      setModerate: () => this.setState({ weather: 1 }),\n      setRough: () => this.setState({ weather: 2 }),\n      showSchedule: () => this.setState({ tab: 'schedule' }),\n      showTide: () => this.setState({ tab: 'tide' }),\n      setWith: () => this.setState({ os: true }),\n      setWithout: () => { clearInterval(this._solveTimer); this.setState({ os: false, solving: false, candParams: null, selected: null }); },\n      closeSel: () => this.setState({ selected: null }),\n      tourOn,\n      tourRectStyle: ts ? ('left:' + ts.r[0] + 'px; top:' + ts.r[1] + 'px; width:' + ts.r[2] + 'px; height:' + ts.r[3] + 'px;') : '',\n      tipStyle: ts ? ('left:' + ts.tip[0] + 'px; top:' + ts.tip[1] + 'px;') : '',\n      tipTitle: ts ? ts.t : '',\n      tipBody: ts ? ts.b : '',\n      tourIndex: tourOn ? ((ti + 1) + ' / ' + TOUR.length) : '',\n      tourNextLabel: ti === TOUR.length - 1 ? 'Done' : 'Next →',\n      startTour: () => this.setState({ tourStep: 0, selected: null, os: true, solving: false }),\n      tourNext: () => this.setState(st => ({ tourStep: st.tourStep + 1 >= TOUR.length ? -1 : st.tourStep + 1 })),\n      tourBack: () => this.setState(st => ({ tourStep: Math.max(0, st.tourStep - 1) })),\n      endTour: () => this.setState({ tourStep: -1 }),\n      generate: () => {\n        if (this.state.solving) return;\n        const w = this.state.os ? this.state.weather : 1;\n        const cands = [\n          { buffer: 5.2, cranes: 1, draft: 12.2, weather: w },\n          { buffer: 1.0, cranes: 1, draft: 13.4, weather: w },\n          { buffer: 4.2, cranes: 2, draft: 12.5, weather: w },\n          { buffer: 2.0, cranes: 3, draft: 13.2, weather: w },\n          { buffer: 3.4, cranes: 2, draft: 12.9, weather: w },\n          { buffer: 1.6, cranes: 3, draft: 12.7, weather: w },\n        ];\n        let i = 0;\n        clearInterval(this._solveTimer);\n        this.setState({ os: true, solving: true, selected: null, candParams: cands[0], evalN: 14 });\n        this._solveTimer = setInterval(() => {\n          i += 1;\n          if (i >= cands.length) {\n            clearInterval(this._solveTimer);\n            const r = this.best(w);\n            this.setState({ solving: false, candParams: null, evalN: 168, buffer: r.b, cranes: r.c, draft: r.d, weather: w });\n          } else {\n            this.setState({ candParams: cands[i], evalN: Math.min(168, 14 + i * 30) });\n          }\n        }, 160);\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
